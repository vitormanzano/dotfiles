# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

set -g @plugin 'tmux-plugins/tmux-resurrect' # Persists tmux session
set -g @plugin 'tmux-plugins/tmux-continuum' # Automatically saves sessions

# Style 
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${gray_light}, bg=${gray_dark}"
set -g status-left "#[fg=${green_soft}, bold] #S #[fg=${gray_light}, nobold] | "
set -g window-status-current-format "#[fg=${cyan_soft}, bold] #[underscore]#I:#W"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light}, bg=default"
set -g mode-style "fg=${gray_dark}, bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${gray_medium}"

# Resurrect
set -g @resurrect-capture-pane-contents 'on'

# Initilize tmux plugin manager
run '~/.tmux/plugins/tpm/tpm'
